<script type="text/javascript">

function renderMenu() {
    const navLinks = document.getElementById('navLinks');
    if (!navLinks) return;

    navLinks.innerHTML = Object.keys(pages).map(key => {
        const label = key.charAt(0).toUpperCase() + key.slice(1);
        return `<a href="/?${key}" onclick="return web.navigate('${key}')">${label}</a>`;
    }).join('\n');
}

</script>
